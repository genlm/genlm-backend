name: GPU tests + code coverage

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

concurrency:
  group: gpu-coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test_vllm_coverage:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-gpu-tests') }}
    runs-on:
      group: gpu-runners
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.5
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .[vllm]
          pip install -e .[lora]
          pip install --force-reinstall 'triton==3.2.0'
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          coverage run --source=genlm/backend -m pytest --benchmark-disable --ignore=tests/test_mlx.py --ignore=tests/test_sgl.py
          coverage json --omit "*/test*"
          coverage report --omit "*/test*"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          slug: genlm/genlm-backend

  test_sgl_coverage:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-gpu-tests') }}
    runs-on:
      group: gpu-runners
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.5
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .[sgl]
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          coverage run --source=genlm/backend -m pytest tests/test_sgl.py
          coverage json --omit "*/test*"
          coverage report --omit "*/test*"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          slug: genlm/genlm-backend

  test_mlx_coverage:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.5
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .[mlx]
          pip install -r requirements-dev.txt

      - name: Run MLX tests
        run: |
          coverage run --source=genlm/backend -m pytest tests/test_mlx.py
          coverage json --omit "*/test*"
          coverage report --omit "*/test*"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          slug: genlm/genlm-backend

  gpu-gate:
    # The single required status check for GPU tests.
    # Passes when the GPU jobs succeed OR are intentionally skipped
    # (skip-gpu-tests label, or non-PR paths); fails on failure/cancelled
    # (including the watchdog cancel or GitHub's 24h queue cancel).
    # Intentionally gates only the GPU jobs; test_mlx_coverage has its own check.
    if: ${{ always() }}
    needs: [test_vllm_coverage, test_sgl_coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Require GPU jobs to pass or be intentionally skipped
        env:
          VLLM_RESULT: ${{ needs.test_vllm_coverage.result }}
          SGL_RESULT: ${{ needs.test_sgl_coverage.result }}
        run: |
          set -euo pipefail
          echo "test_vllm_coverage=$VLLM_RESULT  test_sgl_coverage=$SGL_RESULT"
          for r in "$VLLM_RESULT" "$SGL_RESULT"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::GPU job result '$r'. Re-run, or apply the 'skip-gpu-tests' label to merge without GPU CI."; exit 1 ;;
            esac
          done
